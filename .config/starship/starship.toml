"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false
command_timeout = 200
scan_timeout = 30
format = """
[](color_orange)\
[](bg:color_orange fg:color_fg0)\
[ ](fg:color_orange bg:color_bg1)\
$username\
$hostname\
[](fg:color_bg1 bg:color_aqua)\
$directory\
[](fg:color_aqua bg:color_blue)\
$git_branch\
$git_status\
[](fg:color_blue bg:color_blue2)\
$c\
$rust\
$golang\
$php\
$java\
$haskell\
$python\
[](fg:color_blue2 bg:color_bg3)\
$docker_context\
$conda\
[](fg:color_bg3 bg:color_bg1)\
$time\
[ ](fg:color_bg1)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_fg = '#ebdbb2'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_blue2 = '#076678'
color_aqua = '#68936f'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

[username]
show_always = true
style_user = "bg:color_bg1 fg:color_fg0"
style_root = "bg:color_bg1 fg:color_fg0"
format = '[$user ]($style)'

[hostname]
ssh_only = true
format = '[@$hostname ]($style)'
style = "bg:color_bg1 fg:color_yellow bold"
disabled = false

[directory]
style = "bold fg:#000000 bg:color_aqua"
format = "[ $path ]($style)"
truncation_length = 50
truncation_symbol = "*/"

[directory.substitutions]
"Documents" = "🗃️"
"Downloads" = "⇩"
"Programming" = "<code>"

[git_branch]
symbol = "ⵖ"
style = "bg:color_aqua"
format = '[[ $branch $symbol ](fg:color_fg0 bg:color_blue)]($style)'
truncation_length = 20
truncation_symbol = "…"

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_blue)]($style)'
ignore_submodules = true
untracked = "no"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!"
staged = "+"
deleted = "✘"

[c]
symbol = " "
style = "bg:color_blue2"
format = '[[ $symbol](fg:color_fg0 bg:color_blue2)]($style)'

[rust]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[golang]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
disabled = true

[java]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
disabled = true

[python]
symbol = ""
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue2)]($style)'

#[docker_context]
#symbol = ""
#style = "bg:color_bg3"
#format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[ $time](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[ ❯](bold fg:color_fg0)'
error_symbol = '[ ❯](bold fg:color_red)'
vimcmd_symbol = '[ ❮](bold fg:color_bg1)'
vimcmd_replace_one_symbol = '[](bold fg:color_purple)'
vimcmd_replace_symbol = '[](bold fg:color_purple)'
vimcmd_visual_symbol = '[](bold fg:color_yellow)'
